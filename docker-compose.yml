services:
  mongodb:
    image: mongo:7
    container_name: mentalhealthiq-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mentalhealthiq_mongo_data:/data/db

  mongo-express:
    image: mongo-express:1
    container_name: mentalhealthiq-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb

  api:
    build: .
    container_name: mentalhealthiq-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: mentalhealthiq
      MONGODB_COLLECTION: predictions
      API_HOST: 0.0.0.0
      API_PORT: 8000
    volumes:
      - ./data:/app/data
    depends_on:
      - mongodb

  frontend:
    image: python:3.13-slim
    container_name: mentalhealthiq-frontend
    restart: unless-stopped
    working_dir: /app
    command: python -m http.server 5500 -d frontend
    ports:
      - "5500:5500"
    volumes:
      - ./frontend:/app/frontend:ro
    depends_on:
      - api

volumes:
  mentalhealthiq_mongo_data:
