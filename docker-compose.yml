services:
  mongodb:
    image: mongo:7
    container_name: mentalhealthiq-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mentalhealthiq_mongo_data:/data/db

  mongo-express:
    image: mongo-express:1
    container_name: mentalhealthiq-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb

volumes:
  mentalhealthiq_mongo_data:
